name: test build on windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: run build
        run: mkdir build && cd build && cmake .. && cmake --build . --config Debug -- /m:4